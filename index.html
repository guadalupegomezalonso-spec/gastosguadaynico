                          <p className="text-xs text-cyan-700 mt-1">Plata gastada por Nico para el trabajo que debe ser devuelta.</p>
                        </div>
                        <div className="text-right w-full md:w-auto bg-white/60 p-3 rounded-xl border border-cyan-200">
                           <span className="text-xs font-bold text-cyan-800 uppercase tracking-wider block">Total a cobrar este mes</span>
                           <span className="text-3xl font-black text-cyan-700">{formatARS(reportStats.totalCatamarca)}</span>
                        </div>
                      </div>
                      
                      {reportStats.sortedCatamarca.length === 0 ? (
                        <div className="text-center text-cyan-600/50 py-4 font-medium">No hay gastos de Catamarca registrados este mes.</div>
                      ) : (
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">
                          {reportStats.sortedCatamarca.map(([cat, amount]) => {
                            const pct = reportStats.totalCatamarca > 0 ? Math.round((amount / reportStats.totalCatamarca) * 100) : 0;
                            return (
                              <div key={cat} className="bg-white rounded-xl p-4 shadow-sm border border-cyan-100 flex justify-between items-center">
                                  <div>
                                    <span className="font-bold text-slate-700 block text-sm">{cat}</span>
                                    <span className="text-xs font-bold text-cyan-500">{pct}% del total</span>
                                  </div>
                                  <span className="font-black text-cyan-700 text-lg">{formatARS(amount)}</span>
                              </div>
                            );
                          })}
                        </div>
                      )}
                    </div>
                  </div>
                )}

                {/* -------------------- MIS AHORROS -------------------- */}
                {activeTab === 'ahorros' && (
                  <div className="space-y-8 animate-in fade-in duration-500">
                    <div className="mb-2">
                      <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <i className="fas fa-building-columns text-2xl text-emerald-600"></i> Bóveda de Ahorros
                      </h2>
                      <p className="text-slate-500 text-sm">Gestiona tus ahorros disponibles distribuidos en tus diferentes cuentas.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                      {SAVINGS_BOXES.map(box => {
                        const isDual = box.accounts.length > 1;
                        const mainIsDollar = isUSD(box.accounts[0]);
                        const iconStyle = isDual || mainIsDollar ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700';

                        return (
                          <div key={box.id} className="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex flex-col justify-between group hover:border-emerald-300 transition-colors">
                            <div className="flex justify-between items-start mb-6">
                              <div className="flex items-center gap-2">
                                <div className={`p-2 rounded-lg ${iconStyle}`}>
                                  <i className="fas fa-piggy-bank text-xl"></i>
                                </div>
                                <h3 className="font-bold text-slate-700 text-sm">{box.title}</h3>
                              </div>
                              <button 
                                onClick={() => openHistory(box.id)}
                                className="text-slate-400 hover:text-teal-600 transition-colors p-2 -mr-2 -mt-2 rounded-full hover:bg-slate-50"
                                title="Ver historial de esta cuenta"
                              >
                                <i className="fas fa-clock-rotate-left text-lg"></i>
                              </button>
                            </div>
                            
                            <div className="mb-6 space-y-3">
                              <span className="text-sm text-slate-400 block mb-1">Disponible</span>
                              {box.accounts.map(acc => (
                                <div key={acc} className="flex items-center justify-between">
                                  <span className={`text-2xl font-black ${isUSD(acc) ? 'text-emerald-600' : 'text-blue-600'}`}>
                                    {getCurrencyFormatter(acc)(savingsBalances[acc] || 0)}
                                  </span>
                                  {isDual && <span className="text-xs font-bold text-slate-400 bg-slate-100 px-2 py-1 rounded">{isUSD(acc) ? 'USD' : 'ARS'}</span>}
                                </div>
                              ))}
                            </div>

                            <div className="flex gap-2 border-t border-slate-100 pt-4">
                              <button 
                                onClick={() => openSavingsModal(box.id, 'in')}
                                className="flex-1 flex justify-center items-center gap-2 bg-slate-50 hover:bg-emerald-50 text-slate-600 hover:text-emerald-700 py-2 rounded-lg text-sm font-bold border border-slate-200 transition-colors"
                              >
                                <i className="fas fa-circle-arrow-down"></i> Agregar
                              </button>
                              <button 
                                onClick={() => openSavingsModal(box.id, 'out')}
                                className="flex-1 flex justify-center items-center gap-2 bg-slate-50 hover:bg-rose-50 text-slate-600 hover:text-rose-700 py-2 rounded-lg text-sm font-bold border border-slate-200 transition-colors"
                              >
                                <i className="fas fa-circle-arrow-up"></i> Retirar
                              </button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}

                {/* -------------------- PRÉSTAMOS CAMPO -------------------- */}
                {activeTab === 'campo' && (
                  <div className="space-y-8 animate-in fade-in duration-500">
                    <div className="mb-2">
                      <h2 className="text-2xl font-bold text-slate-800 flex items-center gap-2">
                        <i className="fas fa-tractor text-amber-600"></i> Cuenta Corriente con el Campo
                      </h2>
                      <p className="text-slate-500 text-sm">Registra la plata que le prestás o le pedís al campo. Esto ajusta automáticamente tus saldos en efectivo/cuentas.</p>
                    </div>

                    <div className="space-y-8">
                       {/* SALDO CUENTA CORRIENTE */}
                       <div className={`p-8 rounded-3xl shadow-sm border flex flex-col justify-between text-white ${campoBalance >= 0 ? 'bg-gradient-to-br from-emerald-500 to-teal-600 border-emerald-400' : 'bg-gradient-to-br from-rose-500 to-orange-600 border-rose-400'}`}>
                          <div className="flex justify-between items-start mb-6">
                            <span className="font-bold uppercase tracking-wider text-sm">Saldo Cuenta Corriente</span>
                            <i className="fas fa-scale-balanced text-3xl opacity-80"></i>
                          </div>
                          <span className="text-6xl md:text-7xl font-black block mb-6">{formatARS(Math.abs(campoBalance))}</span>
                          <div className="pt-4 border-t border-white/20 font-bold text-lg">
                              {campoBalance === 0 && "Están a mano. Saldo 0."}
                              {campoBalance > 0 && <span className="flex items-center gap-2"><i className="fas fa-arrow-left"></i> El campo les debe plata a ustedes.</span>}
                              {campoBalance < 0 && <span className="flex items-center gap-2"><i className="fas fa-arrow-right"></i> Ustedes le deben plata al campo.</span>}
                          </div>
                       </div>

                       {/* NUEVO MOVIMIENTO */}
                       <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                          <h2 className="text-xl font-bold mb-6 flex items-center gap-2">
                            <i className="fas fa-plus text-amber-500"></i> Nuevo Movimiento
                          </h2>
                          <form onSubmit={handleCampoSubmit} className="space-y-6">
                            <div className="grid grid-cols-2 md:flex gap-4">
                              <button type="button" onClick={() => setCampoType('le_presto')} className={`flex-1 py-4 rounded-xl text-sm font-bold transition-colors ${campoType === 'le_presto' ? 'bg-amber-100 text-amber-800 border-2 border-amber-500 shadow-inner' : 'bg-slate-100 text-slate-500 border-2 border-transparent hover:bg-slate-200'}`}>
                                <i className="fas fa-arrow-up-right-from-square mb-1 text-lg block"></i> Le presto al campo
                              </button>
                              <button type="button" onClick={() => setCampoType('me_presta')} className={`flex-1 py-4 rounded-xl text-sm font-bold transition-colors ${campoType === 'me_presta' ? 'bg-indigo-100 text-indigo-800 border-2 border-indigo-500 shadow-inner' : 'bg-slate-100 text-slate-500 border-2 border-transparent hover:bg-slate-200'}`}>
                                <i className="fas fa-arrow-down-long mb-1 text-lg block"></i> Pido al campo
                              </button>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                              <div>
                                <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Monto (ARS)</label>
                                <input 
                                  type="text" 
                                  inputMode="numeric"
                                  value={campoAmount ? Number(campoAmount).toLocaleString('es-AR') : ''} 
                                  onChange={(e) => setCampoAmount(e.target.value.replace(/\D/g, ''))} 
                                  placeholder="0" 
                                  className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-bold text-xl" 
                                  required 
                                />
                              </div>

                              <div>
                                <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Cuenta afectada</label>
                                <select value={campoMethod} onChange={(e) => setCampoMethod(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-bold text-slate-700">
                                  {PAYMENT_METHODS.map(method => <option key={method} value={method}>{method}</option>)}
                                </select>
                                <p className="text-[10px] text-slate-400 mt-2">
                                    {campoType === 'le_presto' ? 'La plata sale de esta cuenta.' : 'La plata entra a esta cuenta.'}
                                </p>
                              </div>

                              <div>
                                <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Descripción</label>
                                <input type="text" value={campoDesc} onChange={(e) => setCampoDesc(e.target.value)} placeholder="Ej: Para comprar semillas..." className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium" required />
                              </div>

                              <div>
                                <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Fecha</label>
                                <input type="date" value={campoDate} onChange={(e) => setCampoDate(e.target.value)} className="w-full p-3.5 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-amber-500 outline-none font-medium" required />
                              </div>
                            </div>

                            <div className="pt-2">
                              <button type="submit" className={`w-full md:w-auto md:px-16 text-white font-bold py-4 rounded-xl transition-colors shadow-sm ${campoType === 'le_presto' ? 'bg-amber-500 hover:bg-amber-600' : 'bg-indigo-500 hover:bg-indigo-600'}`}>
                                Registrar Préstamo
                              </button>
                            </div>
                          </form>
                       </div>
                       
                       {/* HISTORIAL */}
                       <div className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6 md:p-8">
                          <h2 className="text-xl font-bold mb-6">Historial de Movimientos</h2>
                          {sortedCampo.length === 0 ? (
                            <div className="text-center py-12 text-slate-400">
                              <i className="fas fa-tractor text-5xl mx-auto mb-4 opacity-20 block"></i>
                              <p>No hay movimientos registrados con el campo.</p>
                            </div>
                          ) : (
                            <div className="space-y-4 overflow-y-auto max-h-[600px] pr-2">
                              {sortedCampo.map(t => (
                                <div key={t.id} className="group flex flex-col sm:flex-row sm:items-center justify-between p-5 rounded-xl border border-slate-100 hover:border-slate-300 bg-slate-50 transition-all gap-4">
                                  <div className="flex items-center gap-5">
                                    <div className={`w-12 h-12 rounded-full flex items-center justify-center shrink-0 shadow-sm ${t.type === 'le_presto' ? 'bg-amber-100 text-amber-600' : 'bg-indigo-100 text-indigo-600'}`}>
                                      {t.type === 'le_presto' ? <i className="fas fa-arrow-up-right-from-square text-lg"></i> : <i className="fas fa-arrow-down-long text-lg"></i>}
                                    </div>
                                    <div>
                                      <h3 className="font-bold text-slate-800 text-base">{t.description}</h3>
                                      <div className="flex items-center gap-3 mt-1.5 flex-wrap">
                                        <p className="text-sm text-slate-500"><i className="far fa-calendar-alt mr-1"></i> {new Date(t.date).toLocaleDateString('es-AR')}</p>
                                        <span className="text-[11px] font-bold px-2 py-0.5 rounded bg-slate-200 text-slate-700 flex items-center gap-1">
                                           <i className="fas fa-wallet"></i> {t.paymentMethod}
                                        </span>
                                      </div>
                                    </div>
                                  </div>
                                  <div className="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto border-t sm:border-0 border-slate-200 pt-3 sm:pt-0">
                                    <span className={`font-black text-xl ${t.type === 'le_presto' ? 'text-amber-600' : 'text-indigo-600'}`}>
                                      {t.type === 'le_presto' ? '+' : '-'}{formatARS(t.amount)}
                                    </span>
                                    <button onClick={() => deleteCampoTransaction(t.id)} className="p-2.5 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg transition-colors" title="Borrar movimiento">
                                      <i className="fas fa-trash-can text-lg"></i>
                                    </button>
                                  </div>
                                </div>
                              ))}
                            </div>
                          )}
                       </div>
                    </div>
                  </div>
                )}

                {/* -------------------- FLUJO DIARIO -------------------- */}
                {activeTab === 'dashboard' && (
                  <div className="space-y-8 animate-in fade-in duration-500">
                    
                    {/* 1. SALDOS REALES */}
                    <div>
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-4 gap-4">
                        <div>
                          <h2 className="text-xl font-bold text-slate-800">Saldos Reales</h2>
                          <p className="text-slate-500 text-sm">El dinero que tienen disponible hoy en base a todo el historial de movimientos.</p>
                        </div>
                        
                        <div className="flex gap-2 w-full md:w-auto">
                            <button onClick={openInternalTransferModal} className="flex-1 md:flex-none bg-indigo-100 hover:bg-indigo-200 text-indigo-800 px-5 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-colors border border-indigo-200 shadow-sm shrink-0">
                              <i className="fas fa-right-left"></i> Pasar Plata
                            </button>
                            <button onClick={openTransferModal} className="flex-1 md:flex-none bg-teal-100 hover:bg-teal-200 text-teal-800 px-5 py-2.5 rounded-xl font-bold text-sm flex items-center justify-center gap-2 transition-colors border border-teal-200 shadow-sm shrink-0">
                              <i className="fas fa-money-bill-transfer"></i> Enviar a Bóveda
                            </button>
                        </div>
                      </div>

                      <section className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <div className="bg-indigo-50 p-6 rounded-2xl shadow-sm border border-indigo-100 flex flex-col justify-between">
                          <div className="flex justify-between items-start text-indigo-600 mb-2">
                            <span className="font-bold">Cuenta Guada</span>
                            <i className="fas fa-wallet text-xl opacity-80"></i>
                          </div>
                          <span className="text-3xl font-black text-indigo-900">{formatARS(accountBalances['Cuenta Guada'])}</span>
                        </div>

                        <div className="bg-blue-50 p-6 rounded-2xl shadow-sm border border-blue-100 flex flex-col justify-between">
                          <div className="flex justify-between items-start text-blue-600 mb-2">
                            <span className="font-bold">Cuenta Nico</span>
                            <i className="fas fa-wallet text-xl opacity-80"></i>
                          </div>
                          <span className="text-3xl font-black text-blue-900">{formatARS(accountBalances['Cuenta Nico'])}</span>
                        </div>

                        <div className="bg-emerald-50 p-6 rounded-2xl shadow-sm border border-emerald-200 flex flex-col justify-between relative overflow-hidden">
                          <div className="flex justify-between items-start text-emerald-700 mb-2">
                            <span className="font-bold">Efectivo Total</span>
                            <i className="fas fa-money-bill-wave text-xl opacity-80"></i>
                          </div>
                          <span className="text-3xl font-black text-emerald-900 mb-2">{formatARS(totalEfectivo)}</span>
                          
                          <div className="flex justify-between text-xs font-bold text-emerald-800 mb-4 px-2 bg-emerald-200/50 rounded py-1.5">
                            <span>G: {formatARS(accountBalances['Efectivo Guada'] || 0)}</span>
                            <span>N: {formatARS(accountBalances['Efectivo Nico'] || 0)}</span>
                            {(accountBalances['Efectivo'] || 0) !== 0 && <span title="Efectivo previo sin asignar">?: {formatARS(accountBalances['Efectivo'])}</span>}
                          </div>
                          
                          <div className="bg-white/60 rounded-xl p-3 border border-emerald-100 space-y-2">
                            <div className="flex justify-between items-center">
                              <label className="text-xs font-bold text-emerald-700">Reservado (No tocar):</label>
                              <input 
                                type="text" 
                                inputMode="numeric"
                                value={reservedCash ? Number(reservedCash).toLocaleString('es-AR') : ''} 
                                onChange={(e) => {
                                  const val = e.target.value.replace(/\D/g, '');
                                  setReservedCash(val ? Number(val) : 0);
                                }}
                                className="w-24 bg-white border border-emerald-300 rounded text-right p-1 text-sm font-bold outline-none focus:ring-2 focus:ring-emerald-500 text-emerald-800"
                              />
                            </div>
                            <div className="flex justify-between items-center pt-2 border-t border-emerald-200/50">
                              <span className="text-xs font-bold text-slate-600">Disponible para gastar:</span>
                              <span className={`font-black ${totalEfectivo - reservedCash < 0 ? 'text-rose-600' : 'text-emerald-700'}`}>
                                {formatARS(totalEfectivo - reservedCash)}
                              </span>
                            </div>
                          </div>
                        </div>

                        <div className="bg-slate-800 p-6 rounded-2xl shadow-sm border border-slate-700 flex flex-col justify-between relative overflow-hidden text-white">
                          <div className="absolute top-0 right-0 p-4 opacity-5">
                            <i className="fas fa-vault text-6xl"></i>
                          </div>
                          <div className="flex justify-between items-start text-slate-300 mb-2 relative z-10">
                            <span className="font-bold">Fondo Total</span>
                            <i className="fas fa-scale-balanced text-xl opacity-80"></i>
                          </div>
                          <span className="text-3xl font-black text-white mb-4 relative z-10">{formatARS(totalSaldos)}</span>
                          
                          <div className="bg-slate-700/50 rounded-xl p-3 border border-slate-600 relative z-10">
                            <div className="flex justify-between items-center text-xs font-bold text-slate-300">
                              <span>Suma de las 3 cuentas</span>
                              <i className="fas fa-check-circle text-emerald-400"></i>
                            </div>
                          </div>
                        </div>
                      </section>
                    </div>

                    {/* 2. CARGA RÁPIDA (Ancho completo) */}
                    <section className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                      <h2 className="text-lg font-bold mb-6 flex items-center gap-2">
                        <i className="fas fa-plus text-xl text-teal-600"></i> Carga Rápida
                      </h2>
                      <form onSubmit={handleSubmit} className="space-y-4">
                        <div className="grid grid-cols-2 md:flex gap-2 mb-2">
                          <button type="button" onClick={() => setPerson('Guada')} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${person === 'Guada' ? 'bg-teal-100 text-teal-800 border-2 border-teal-500' : 'bg-slate-100 text-slate-500 border-2 border-transparent'}`}>Guada</button>
                          <button type="button" onClick={() => setPerson('Nico')} className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${person === 'Nico' ? 'bg-teal-100 text-teal-800 border-2 border-teal-500' : 'bg-slate-100 text-slate-500 border-2 border-transparent'}`}>Nico</button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Tipo de Movimiento</label>
                              <select value={type} onChange={(e) => setType(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                                {Object.keys(STRUCTURE).filter(t => t !== 'ahorro' && t !== 'transferencia').map(t => (
                                  <option key={t} value={t}>{TYPE_LABELS[t]}</option>
                                ))}
                              </select>
                            </div>

                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Categoría</label>
                              <select value={category} onChange={(e) => setCategory(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none">
                                {STRUCTURE[type]?.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                              </select>
                            </div>

                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Monto (ARS)</label>
                              <input 
                                type="text" 
                                inputMode="numeric"
                                value={amount ? Number(amount).toLocaleString('es-AR') : ''} 
                                onChange={(e) => setAmount(e.target.value.replace(/\D/g, ''))} 
                                placeholder="0" 
                                className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none font-bold text-lg" 
                                required 
                              />
                            </div>

                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Medio de Pago / Cuenta</label>
                              <select value={paymentMethod} onChange={(e) => setPaymentMethod(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none font-bold text-slate-700">
                                {PAYMENT_METHODS.map(method => <option key={method} value={method}>{method}</option>)}
                              </select>
                            </div>

                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">
                                Descripción 
                                {category === 'Otros' && <span className="text-rose-500 ml-1 normal-case">* (Debes detallar el gasto)</span>}
                              </label>
                              <input 
                                type="text" 
                                value={description} 
                                onChange={(e) => setDescription(e.target.value)} 
                                placeholder={category === 'Otros' ? "Detalla en qué se gastó..." : "Ej: Compra en Coto"} 
                                className={`w-full p-2.5 bg-slate-50 border rounded-lg focus:ring-2 focus:ring-teal-500 outline-none ${category === 'Otros' && !description ? 'border-rose-300' : 'border-slate-200'}`}
                                required={category === 'Otros'}
                              />
                            </div>

                            <div>
                              <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Fecha</label>
                              <input type="date" value={date} onChange={(e) => setDate(e.target.value)} className="w-full p-2.5 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none" required />
                            </div>
                        </div>

                        {paymentMethod.includes('Efectivo') && type !== 'ingreso' && (totalEfectivo - reservedCash - Number(amount) < 0) && (
                          <div className="bg-amber-50 text-amber-800 p-3 rounded-lg text-xs flex items-start gap-2 border border-amber-200">
                            <i className="fas fa-triangle-exclamation text-base mt-0.5 shrink-0"></i>
                            <div>Estás gastando dinero de tu <b>Efectivo Reservado</b>. Tu saldo disponible para gastar en efectivo quedará en negativo.</div>
                          </div>
                        )}

                        <button type="submit" className="w-full md:w-auto md:px-12 bg-teal-600 hover:bg-teal-700 text-white font-bold py-3.5 rounded-lg transition-colors mt-4">
                          Registrar Movimiento
                        </button>
                      </form>
                    </section>

                    {/* 3. MOVIMIENTOS GUARDADOS */}
                    <section className="bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
                      <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h2 className="text-lg font-bold">Movimientos Guardados</h2>
                        <div className="flex bg-slate-100 rounded-lg p-1 flex-wrap gap-1 w-full md:w-auto">
                          <button onClick={() => setFilterType('all')} className={`flex-1 md:flex-none px-3 py-1.5 text-xs font-medium rounded-md capitalize transition-colors ${filterType === 'all' ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>Todos</button>
                          {Object.keys(STRUCTURE).map(ft => (
                            <button key={ft} onClick={() => setFilterType(ft)} className={`flex-1 md:flex-none px-3 py-1.5 text-xs font-medium rounded-md capitalize transition-colors ${filterType === ft ? 'bg-white shadow text-slate-800' : 'text-slate-500 hover:text-slate-700'}`}>
                              {TYPE_LABELS[ft]}
                            </button>
                          ))}
                        </div>
                      </div>

                      {filteredTransactions.length === 0 ? (
                          <div className="text-center py-12 text-slate-400">
                            <i className="fas fa-list text-5xl mx-auto mb-3 opacity-20 block"></i>
                            <p>No hay movimientos para este filtro.</p>
                          </div>
                        ) : (
                        <div className="space-y-3 overflow-y-auto max-h-[500px] pr-2">
                          {filteredTransactions.map(t => (
                            <div key={t.id} className="group flex items-center justify-between p-4 rounded-xl border border-slate-100 hover:border-slate-200 hover:shadow-sm transition-all bg-slate-50 hover:bg-white">
                              <div className="flex items-center gap-4">
                                <div className={`w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${getTypeColor(t.type)}`}>
                                  {getTypeIcon(t.type)}
                                </div>
                                <div>
                                  <div className="flex items-center gap-2">
                                    <h3 className="font-bold text-slate-800">{t.category}</h3>
                                    <span className="text-[10px] uppercase font-bold tracking-wider px-2 py-0.5 rounded-full bg-slate-200 text-slate-600">
                                      {t.person}
                                    </span>
                                  </div>
                                  <div className="flex items-center gap-2 mt-0.5 flex-wrap">
                                    <p className="text-sm text-slate-500">{t.description || 'Sin descripción'} • {t.date ? new Date(t.date).toLocaleDateString('es-AR') : 'Sin fecha'}</p>
                                    {t.type === 'transferencia' ? (
                                      <span className="text-[10px] font-bold flex items-center gap-1 px-1.5 py-0.5 rounded bg-indigo-50 text-indigo-700 border border-indigo-100">
                                        {t.paymentMethod} <i className="fas fa-arrow-right text-[8px]"></i> {t.transferTo}
                                      </span>
                                    ) : (
                                      <span className="text-[10px] font-bold flex items-center gap-1 px-1.5 py-0.5 rounded bg-slate-100 text-slate-600 border border-slate-200">
                                        <i className="fas fa-wallet"></i> {t.paymentMethod}
                                      </span>
                                    )}
                                  </div>
                                </div>
                              </div>
                              <div className="flex items-center gap-4">
                                {t.type === 'transferencia' ? (
                                    <span className="font-black text-lg text-indigo-600">
                                        <i className="fas fa-right-left text-sm mr-1 opacity-70"></i> {formatARS(t.amount)}
                                    </span>
                                ) : (
                                    <span className={`font-black text-lg ${t.type === 'ingreso' ? 'text-emerald-600' : 'text-slate-800'}`}>
                                      {t.type === 'ingreso' ? '+' : '-'}{formatARS(t.amount)}
                                    </span>
                                )}
                                <button onClick={() => deleteTransaction(t.id)} className="p-2 text-slate-400 hover:text-rose-500 hover:bg-rose-50 rounded-lg opacity-0 group-hover:opacity-100 transition-all">
                                  <i className="fas fa-trash-can"></i>
                                </button>
                              </div>
                            </div>
                          ))}
                        </div>
                      )}
                    </section>

                    {/* 4. CHECKLIST DE VENCIMIENTOS */}
                    <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                      <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-4 flex items-center gap-2">
                        <i className="fas fa-calendar-check text-xl text-teal-500"></i> Checklist de Vencimientos
                      </h3>
                      <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                        {Object.entries(mandatoryChecklist).map(([item, isPaid]) => (
                          <div key={item} className={`p-3 rounded-xl border flex items-center gap-3 transition-all ${isPaid ? 'bg-emerald-50 border-emerald-200' : 'bg-slate-50 border-slate-200'}`}>
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center shrink-0 ${isPaid ? 'bg-emerald-500 text-white shadow-sm' : 'bg-slate-200 text-slate-400'}`}>
                              {isPaid ? <i className="fas fa-check"></i> : <i className="fas fa-hourglass-half"></i>}
                            </div>
                            <span className={`text-sm font-bold ${isPaid ? 'text-emerald-800' : 'text-slate-500'}`}>{item}</span>
                          </div>
                        ))}
                      </div>
                    </section>

                    {/* 5. RECORDATORIO CALENDAR */}
                    <section className="bg-blue-50 rounded-2xl shadow-sm border border-blue-100 p-6 flex flex-col md:flex-row items-center justify-between gap-6">
                      <div>
                        <h2 className="text-lg font-bold flex items-center gap-2 text-blue-900 mb-1">
                          <i className="far fa-calendar-check text-xl text-blue-600"></i> Recordatorio Diario
                        </h2>
                        <p className="text-sm text-blue-700">Creen un evento automático en Google Calendar para que les suene todos los días a las 23:00 hs y no se olviden de cargar los gastos.</p>
                      </div>
                      <a href={getCalendarLink()} target="_blank" rel="noreferrer" className="flex items-center justify-center gap-2 w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white text-sm font-bold py-3.5 px-6 rounded-xl transition-colors shrink-0">
                        <i className="fab fa-google text-lg"></i> Agendar Alarma
                      </a>
                    </section>

                  </div>
                )}
              </main>

              {/* MODAL TRASPASO INTERNO (PASAR PLATA) */}
              {internalTransferModal && (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-xl overflow-hidden">
                    <div className="p-4 flex justify-between items-center bg-indigo-600 text-white">
                      <h3 className="font-bold flex items-center gap-2">
                        <i className="fas fa-right-left text-xl"></i> Paso de Plata
                      </h3>
                      <button onClick={() => setInternalTransferModal(false)} className="text-white/80 hover:text-white bg-transparent p-1 rounded-full hover:bg-white/20 transition-colors">
                        <i className="fas fa-xmark text-xl"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={handleInternalTransferSubmit} className="p-6 space-y-4">
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <h4 className="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center gap-2">¿De dónde sale y a dónde va?</h4>
                          <div className="space-y-3">
                              <div>
                                  <label className="block text-xs font-semibold text-slate-600 mb-1">Sale de (Origen)</label>
                                  <select value={transferIntFrom} onChange={(e) => setTransferIntFrom(e.target.value)} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                                    {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}
                                  </select>
                              </div>
                              <div className="flex justify-center text-indigo-300 my-1"><i className="fas fa-arrow-down"></i></div>
                              <div>
                                  <label className="block text-xs font-semibold text-slate-600 mb-1">Entra a (Destino)</label>
                                  <select value={transferIntTo} onChange={(e) => setTransferIntTo(e.target.value)} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-bold">
                                    {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}
                                  </select>
                              </div>
                          </div>
                      </div>

                      <div>
                          <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Monto a traspasar (ARS)</label>
                          <input 
                            type="text" 
                            inputMode="numeric"
                            value={transferIntAmount ? Number(transferIntAmount).toLocaleString('es-AR') : ''} 
                            onChange={(e) => setTransferIntAmount(e.target.value.replace(/\D/g, ''))} 
                            placeholder="0" 
                            className="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-xl text-indigo-700" 
                            required 
                          />
                      </div>

                      <div>
                          <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Fecha</label>
                          <input 
                            type="date" 
                            value={transferIntDate} 
                            onChange={(e) => setTransferIntDate(e.target.value)} 
                            className="w-full p-3 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none font-medium" 
                            required 
                          />
                      </div>

                      <div className="flex gap-3 pt-2">
                        <button type="button" onClick={() => setInternalTransferModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">Cancelar</button>
                        <button type="submit" className="flex-1 py-3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-lg transition-colors">Confirmar Traspaso</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL TRANSFERENCIA A BÓVEDA */}
              {transferModal && (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-xl overflow-hidden">
                    <div className="p-4 flex justify-between items-center bg-teal-600 text-white">
                      <h3 className="font-bold flex items-center gap-2">
                        <i className="fas fa-money-bill-transfer text-xl"></i> Transferir a Bóveda
                      </h3>
                      <button onClick={() => setTransferModal(false)} className="text-white/80 hover:text-white bg-transparent p-1 rounded-full hover:bg-white/20 transition-colors">
                        <i className="fas fa-xmark text-xl"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={handleTransferSubmit} className="p-6 space-y-4">
                      <div className="bg-slate-50 p-4 rounded-xl border border-slate-200">
                          <h4 className="text-xs font-bold text-slate-500 uppercase mb-3 flex items-center gap-2"><i className="fas fa-arrow-up-right-from-square text-rose-500"></i> Sale de (Flujo Diario)</h4>
                          <div className="space-y-3">
                              <div>
                                  <label className="block text-xs font-semibold text-slate-600 mb-1">Cuenta de donde se descuenta</label>
                                  <select value={transferFrom} onChange={(e) => setTransferFrom(e.target.value)} className="w-full p-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none font-bold">
                                    {PAYMENT_METHODS.map(m => <option key={m} value={m}>{m}</option>)}
                                  </select>
                              </div>
                              <div>
                                  <label className="block text-xs font-semibold text-slate-600 mb-1">Monto a descontar (ARS)</label>
                                  <input 
                                    type="text" 
                                    inputMode="numeric"
                                    value={transferAmountOut ? Number(transferAmountOut).toLocaleString('es-AR') : ''} 
                                    onChange={(e) => {
                                        const val = e.target.value.replace(/\D/g, '');
                                        setTransferAmountOut(val);
                                        if (!isUSD(transferTo)) setTransferAmountIn(val);
                                    }} 
                                    placeholder="0" 
                                    className="w-full p-2.5 bg-white border border-slate-300 rounded-lg focus:ring-2 focus:ring-teal-500 outline-none font-bold text-lg text-rose-600" 
                                    required 
                                  />
                              </div>
                          </div>
                      </div>

                      <div className="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                          <h4 className="text-xs font-bold text-emerald-700 uppercase mb-3 flex items-center gap-2"><i className="fas fa-arrow-right-to-bracket"></i> Entra a (Bóveda)</h4>
                          <div className="space-y-3">
                              <div>
                                  <label className="block text-xs font-semibold text-emerald-800 mb-1">Cuenta de Ahorro Destino</label>
                                  <select value={transferTo} onChange={(e) => {
                                      setTransferTo(e.target.value);
                                      if (!isUSD(e.target.value) && transferAmountOut) setTransferAmountIn(transferAmountOut);
                                      else setTransferAmountIn('');
                                  }} className="w-full p-2.5 bg-white border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-emerald-900">
                                    {SAVINGS_ACCOUNTS.map(m => <option key={m} value={m}>{formatAccountName(m)}</option>)}
                                  </select>
                              </div>
                              <div>
                                  <label className="block text-xs font-semibold text-emerald-800 mb-1">Monto que ingresa {isUSD(transferTo) ? '(USD)' : '(ARS)'}</label>
                                  <input 
                                    type="text" 
                                    inputMode="numeric"
                                    value={transferAmountIn ? Number(transferAmountIn).toLocaleString('es-AR') : ''} 
                                    onChange={(e) => setTransferAmountIn(e.target.value.replace(/\D/g, ''))} 
                                    placeholder="0" 
                                    className="w-full p-2.5 bg-white border border-emerald-300 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none font-bold text-lg text-emerald-700" 
                                    required 
                                  />
                              </div>
                          </div>
                      </div>

                      <div className="flex gap-3 pt-2">
                        <button type="button" onClick={() => setTransferModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">Cancelar</button>
                        <button type="submit" className="flex-1 py-3 bg-teal-600 hover:bg-teal-700 text-white font-bold rounded-lg transition-colors">Confirmar Envío</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL INGRESO/RETIRO AHORROS */}
              {savingsModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                  <div className="bg-white rounded-2xl w-full max-w-md shadow-xl overflow-hidden">
                    <div className={`p-4 flex justify-between items-center text-white ${savingsModal.type === 'in' ? 'bg-emerald-600' : 'bg-rose-600'}`}>
                      <h3 className="font-bold flex items-center gap-2">
                        {savingsModal.type === 'in' ? <i className="fas fa-circle-arrow-down text-xl"></i> : <i className="fas fa-circle-arrow-up text-xl"></i>}
                        {savingsModal.type === 'in' ? 'Ingresar a' : 'Retirar de'} {SAVINGS_BOXES.find(b => b.id === savingsModal.boxId)?.title}
                      </h3>
                      <button onClick={closeSavingsModal} className="text-white/80 hover:text-white bg-transparent p-1 rounded-full hover:bg-white/20 transition-colors">
                        <i className="fas fa-xmark text-xl"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={handleSavingsSubmit} className="p-6 space-y-4">
                      {savingsModal.accounts.length > 1 && (
                        <div>
                          <label className="block text-xs font-semibold text-slate-500 uppercase mb-2">Moneda</label>
                          <div className="flex gap-2">
                             {savingsModal.accounts.map(acc => (
                                <button
                                   key={acc}
                                   type="button"
                                   onClick={() => setSavingsModal({...savingsModal, selectedAccount: acc})}
                                   className={`flex-1 py-2.5 rounded-lg text-sm font-bold transition-colors ${savingsModal.selectedAccount === acc ? 'bg-emerald-100 text-emerald-800 border-2 border-emerald-500' : 'bg-slate-100 text-slate-500 border-2 border-transparent'}`}
                                >
                                   {isUSD(acc) ? 'Dólares (USD)' : 'Pesos (ARS)'}
                                </button>
                             ))}
                          </div>
                        </div>
                      )}
                      <div>
                        <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">Monto {isUSD(savingsModal.selectedAccount) ? '(USD)' : '(ARS)'}</label>
                        <input 
                          type="text" 
                          inputMode="numeric"
                          value={savingsAmount ? Number(savingsAmount).toLocaleString('es-AR') : ''} 
                          onChange={(e) => setSavingsAmount(e.target.value.replace(/\D/g, ''))} 
                          placeholder="0" 
                          className="w-full p-3 bg-slate-50 border border-slate-200 rounded-lg focus:ring-2 focus:ring-emerald-500 outline-none text-xl font-bold" 
                          autoFocus 
                          required 
                        />
                      </div>
                      <div>
                        <label className="block text-xs font-semibold text-slate-500 uppercase mb-1">
                          Motivo {savingsModal.type === 'out' && <span className="text-rose-500">* Obligatorio</span>}
                        </label>
                        <input type="text" value={savingsReason} onChange={(e) => setSavingsReason(e.target.value)} placeholder={savingsModal.type === 'in' ? "Ej: Sobrante del sueldo" : "Ej: Compra de pasajes"} className={`w-full p-3 bg-slate-50 border rounded-lg outline-none ${savingsModal.type === 'out' && !savingsReason ? 'border-rose-300 focus:ring-2 focus:ring-rose-500' : 'border-slate-200 focus:ring-2 focus:ring-emerald-500'}`} required={savingsModal.type === 'out'} />
                      </div>
                      <div className="flex gap-3 pt-4">
                        <button type="button" onClick={closeSavingsModal} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-lg hover:bg-slate-200 transition-colors">Cancelar</button>
                        <button type="submit" className={`flex-1 py-3 text-white font-bold rounded-lg transition-colors ${savingsModal.type === 'in' ? 'bg-emerald-600 hover:bg-emerald-700' : 'bg-rose-600 hover:bg-rose-700'}`}>Confirmar {savingsModal.type === 'in' ? 'Ingreso' : 'Retiro'}</button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {historyModal.isOpen && (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50 animate-in fade-in duration-200">
                  <div className="bg-white rounded-2xl w-full max-w-lg shadow-xl overflow-hidden flex flex-col max-h-[80vh]">
                    <div className="p-4 flex justify-between items-center bg-slate-800 text-white">
                      <h3 className="font-bold flex items-center gap-2">
                        <i className="fas fa-clock-rotate-left"></i> Historial: {SAVINGS_BOXES.find(b => b.id === historyModal.boxId)?.title}
                      </h3>
                      <button onClick={closeHistory} className="text-white/80 hover:text-white bg-transparent p-1 rounded-full hover:bg-white/20 transition-colors">
                        <i className="fas fa-xmark text-xl"></i>
                      </button>
                    </div>
                    <div className="p-4 overflow-y-auto flex-1 bg-slate-50">
                      {sortedSavings.filter(tx => historyModal.accounts.includes(tx.account)).length === 0 ? (
                        <p className="text-center text-slate-500 py-8">No hay movimientos para esta cuenta.</p>
                      ) : (
                        <div className="space-y-3">
                          {sortedSavings.filter(tx => historyModal.accounts.includes(tx.account)).map(tx => (
                            <div key={tx.id} className="flex justify-between items-center p-4 rounded-xl border border-slate-200 bg-white shadow-sm">
                              <div>
                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full ${tx.type === 'in' ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                                  {tx.type === 'in' ? 'INGRESO' : 'RETIRO'}
                                </span>
                                {historyModal.accounts.length > 1 && (
                                  <span className="ml-2 text-[10px] bg-slate-100 text-slate-500 border border-slate-200 px-1.5 py-0.5 rounded font-bold">
                                    {isUSD(tx.account) ? 'USD' : 'ARS'}
                                  </span>
                                )}
                                <p className="text-sm font-medium text-slate-800 mt-1">{tx.reason}</p>
                                <p className="text-xs text-slate-500 mt-0.5"><i className="far fa-calendar-alt"></i> {tx.date ? new Date(tx.date).toLocaleDateString('es-AR') : 'Sin fecha'}</p>
                              </div>
                              <span className={`font-black text-lg ${tx.type === 'in' ? 'text-emerald-600' : 'text-rose-600'}`}>
                                {tx.type === 'in' ? '+' : '-'}{getCurrencyFormatter(tx.account)(tx.amount)}
                              </span>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        }

        // SISTEMA DE PREVENCIÓN DE PANTALLA BLANCA (Error Boundary)
        class ErrorBoundary extends React.Component {
          constructor(props) {
            super(props);
            this.state = { hasError: false, error: null };
          }
          static getDerivedStateFromError(error) { return { hasError: true, error }; }
          render() {
            if (this.state.hasError) {
              return (
                <div className="p-8 text-rose-600 bg-rose-50 min-h-screen">
                  <h1 className="text-2xl font-bold mb-4"><i className="fas fa-triangle-exclamation"></i> Algo salió mal internamente</h1>
                  <p className="mb-4">Parece que hay un error de conexión, pero no te preocupes, tus datos en la nube están a salvo.</p>
                  <pre className="text-sm bg-white p-4 border border-rose-200 rounded-lg overflow-auto">{this.state.error && this.state.error.toString()}</pre>
                </div>
              );
            }
            return this.props.children;
          }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        const renderApp = () => root.render(<ErrorBoundary><App /></ErrorBoundary>);
        
        // Iniciador 100% a prueba de fallos
        const startApp = () => {
            if (window.Firebase) {
                renderApp();
            } else {
                setTimeout(startApp, 500); 
            }
        };

        startApp();
    </script>
</body>
</html>
