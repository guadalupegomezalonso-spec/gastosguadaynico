<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hogar Guada & Nico - Finanzas</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Carga de la Base de Datos Firebase -->
    <script type="module">
      import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
      import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      window.Firebase = {
        initializeApp, getApps, getApp, getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged,
        getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc
      };
    </script>
</head>
<body>
    <!-- Pantalla de carga nativa -->
    <div id="root">
      <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; color: #0f766e; background-color: #f8fafc;">
          <svg style="width: 50px; height: 50px; animation: spin 1s linear infinite;" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" stroke-opacity="0.25"></circle>
            <path fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <h2 style="margin-top: 20px; font-weight: bold;">Cargando Finanzas...</h2>
          <style>@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }</style>
      </div>
    </div>

    <script type="text/babel">
        const { useState, useMemo, useEffect } = React;

        // ESTRUCTURA DE CATEGORÍAS Y CUENTAS
        const PAYMENT_METHODS = ['Efectivo Guada', 'Efectivo Nico', 'Cuenta Guada', 'Cuenta Nico'];
        const SAVINGS_ACCOUNTS = ['USD CASA', 'USD BANCO GUADA', 'USD BANCO NICO', 'IOL GUADA', 'IOL GUADA USD', 'IOL NICO', 'IOL NICO USD', 'PESOS EFECTIVO'];
        const SAVINGS_BOXES = [
          { id: 'USD CASA', title: 'USD CASA', accounts: ['USD CASA'] },
          { id: 'USD BANCO GUADA', title: 'USD BANCO GUADA', accounts: ['USD BANCO GUADA'] },
          { id: 'USD BANCO NICO', title: 'USD BANCO NICO', accounts: ['USD BANCO NICO'] },
          { id: 'IOL GUADA', title: 'IOL GUADA', accounts: ['IOL GUADA', 'IOL GUADA USD'] },
          { id: 'IOL NICO', title: 'IOL NICO', accounts: ['IOL NICO', 'IOL NICO USD'] },
          { id: 'PESOS EFECTIVO', title: 'PESOS EFECTIVO', accounts: ['PESOS EFECTIVO'] }
        ];
        const formatAccountName = (acc) => {
          if (acc === 'IOL GUADA') return 'IOL GUADA (ARS)';
          if (acc === 'IOL NICO') return 'IOL NICO (ARS)';
          if (acc === 'IOL GUADA USD') return 'IOL GUADA (USD)';
          if (acc === 'IOL NICO USD') return 'IOL NICO (USD)';
          return acc;
        };

        const STRUCTURE = {
          ingreso: ['Sueldo Nico', 'Sueldo Guada', 'Reintegro Catamarca'],
          pago_tarjetas: ['Tarjeta Nico', 'Tarjeta Guada', 'Naranja Nico', 'Naranja Guada'],
          gastos_casa: ['Expensas casa', 'Expensas terreno', 'Luz', 'Agua', 'Mirta', 'Piletero', 'Jardinero', 'Crédito auto', 'Crédito Hipotecario'],
          gastos_diarios: ['Verdulería', 'Carnicería', 'Super/almacén', 'Delivery', 'Nafta', 'Comidas afuera/salidas', 'Salidas con amigos/flia', 'Regalos', 'Remedios/farmacia/suplementos', 'Dentista/medico', 'Peluquería/manos/depilación', 'Otros'],
          ahorro: ['Envío a Bóveda'],
          transferencia: ['Paso de Plata'], // Agregado para permitir traspasos internos
          catamarca: ['Super/almacén/comida', 'Nafta', 'Gastos Casa', 'Delivery', 'Kiosco', 'Otros']
        };
        const TYPE_LABELS = { ingreso: 'Ingreso', pago_tarjetas: 'Pago tarjetas', gastos_casa: 'Pagos casa', gastos_diarios: 'Gastos diarios', ahorro: 'Ahorro / Inversión', transferencia: 'Pasos de Plata', catamarca: 'Catamarca' };

        function App() {
          const [activeTab, setActiveTab] = useState('dashboard');
          const [transactions, setTransactions] = useState([]);
          const [savingsTx, setSavingsTx] = useState([]);
          const [campoTx, setCampoTx] = useState([]);
          const [budgets, setBudgets] = useState({});
          
          const [savingsModal, setSavingsModal] = useState({ isOpen: false, type: 'in', boxId: '', accounts: [], selectedAccount: '' });
          const [savingsAmount, setSavingsAmount] = useState('');
          const [savingsReason, setSavingsReason] = useState('');
          const [historyModal, setHistoryModal] = useState({ isOpen: false, boxId: '', accounts: [] });

          // Modal Transferencia a Bóveda
          const [transferModal, setTransferModal] = useState(false);
          const [transferFrom, setTransferFrom] = useState(PAYMENT_METHODS[0]);
          const [transferTo, setTransferTo] = useState(SAVINGS_ACCOUNTS[0]);
          const [transferAmountOut, setTransferAmountOut] = useState('');
          const [transferAmountIn, setTransferAmountIn] = useState('');

          // Modal Traspaso Interno (Pasar Plata)
          const [internalTransferModal, setInternalTransferModal] = useState(false);
          const [transferIntFrom, setTransferIntFrom] = useState(PAYMENT_METHODS[0]);
          const [transferIntTo, setTransferIntTo] = useState(PAYMENT_METHODS[1]);
          const [transferIntAmount, setTransferIntAmount] = useState('');
          const [transferIntDate, setTransferIntDate] = useState(new Date().toISOString().split('T')[0]);

          const [reservedCash, setReservedCash] = useState(0); 

          const [type, setType] = useState('gastos_diarios');
          const [category, setCategory] = useState(STRUCTURE.gastos_diarios[0]);
          const [amount, setAmount] = useState('');
          const [paymentMethod, setPaymentMethod] = useState(PAYMENT_METHODS[0]);
          const [description, setDescription] = useState('');
          const [date, setDate] = useState(new Date().toISOString().split('T')[0]);
          const [person, setPerson] = useState('Guada');

          // Estados Préstamo Campo
          const [campoType, setCampoType] = useState('le_presto');
          const [campoAmount, setCampoAmount] = useState('');
          const [campoMethod, setCampoMethod] = useState(PAYMENT_METHODS[0]);
          const [campoDesc, setCampoDesc] = useState('');
          const [campoDate, setCampoDate] = useState(new Date().toISOString().split('T')[0]);

          const currentMonthString = new Date().toISOString().substring(0, 7);
          const [filterMonth, setFilterMonth] = useState(currentMonthString);
          const [filterType, setFilterType] = useState('all');
          
          const [errorMsg, setErrorMsg] = useState('');
          const [user, setUser] = useState(null);
          const [isDbConnected, setIsDbConnected] = useState(false);

          // Estado para Edición de Presupuestos
          const [editingBudget, setEditingBudget] = useState(false);
          const [budgetForm, setBudgetForm] = useState({ pago_tarjetas: 0, gastos_casa: 0, gastos_diarios: 0 });

          // CONFIGURACIÓN DE FIREBASE
          const dbConfig = useMemo(() => {
            if (!window.Firebase) return null;
            const { initializeApp, getApps, getApp, getAuth, getFirestore } = window.Firebase;
            let config = {};
            if (typeof __firebase_config !== 'undefined') {
                config = JSON.parse(__firebase_config);
            } else {
                config = {
                    apiKey: "AIzaSyDYDrS7HLB0gBV6y4OUwLZW3dinq5BAXrg",
                    authDomain: "hogarguadanico.firebaseapp.com",
                    projectId: "hogarguadanico",
                    storageBucket: "hogarguadanico.firebasestorage.app",
                    messagingSenderId: "875232852009",
                    appId: "1:875232852009:web:0ec9e0d07aeba8dab9c438"
                };
            }
            try {
              const app = getApps().length > 0 ? getApp() : initializeApp(config);
              return { auth: getAuth(app), db: getFirestore(app) };
            } catch (e) { return null; }
          }, []);

          // AUTENTICACIÓN Y LECTURA DE DATOS
          useEffect(() => {
            if (!dbConfig) return;
            const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.Firebase;
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(dbConfig.auth, __initial_auth_token);
                else await signInAnonymously(dbConfig.auth);
              } catch (e) {}
            };
            initAuth();
            const unsubscribe = onAuthStateChanged(dbConfig.auth, setUser);
            return () => unsubscribe();
          }, [dbConfig]);

          useEffect(() => {
            if (!user || !dbConfig) return;
            const { collection, onSnapshot } = window.Firebase;
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';

            const txRef = collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'transactions');
            const savRef = collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'savings');
            const camRef = collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'campo');
            const budRef = collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'budgets');

            const unsubTx = onSnapshot(txRef, (snapshot) => {
              setTransactions(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
              setIsDbConnected(true);
            }, (err) => console.error(err));

            const unsubSav = onSnapshot(savRef, (snapshot) => {
              setSavingsTx(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
            }, (err) => console.error(err));

            const unsubCam = onSnapshot(camRef, (snapshot) => {
              setCampoTx(snapshot.docs.map(d => ({id: d.id, ...d.data()})));
            }, (err) => console.error(err));

            const unsubBud = onSnapshot(budRef, (snapshot) => {
              const data = {};
              snapshot.docs.forEach(d => { data[d.id] = d.data(); });
              setBudgets(data);
            }, (err) => console.error(err));

            return () => { unsubTx(); unsubSav(); unsubCam(); unsubBud(); };
          }, [user, dbConfig]);

          useEffect(() => {
            if (STRUCTURE[type] && !STRUCTURE[type].includes(category)) setCategory(STRUCTURE[type][0]);
          }, [type, category]);

          useEffect(() => {
            if (budgets[filterMonth]) setBudgetForm(budgets[filterMonth]);
            else setBudgetForm({ pago_tarjetas: 0, gastos_casa: 0, gastos_diarios: 0 });
            setEditingBudget(false);
          }, [filterMonth, budgets]);

          const showError = (msg) => {
            setErrorMsg(msg);
            setTimeout(() => setErrorMsg(''), 4000);
          }

          const filteredTransactions = useMemo(() => {
            return transactions.filter(t => {
              const safeDate = t.date || '';
              const matchMonth = filterMonth === 'all' || (safeDate && safeDate.substring(0, 7) === filterMonth);
              const matchType = filterType === 'all' || t.type === filterType;
              return matchMonth && matchType;
            }).sort((a, b) => {
              const diff = new Date(b.date || 0) - new Date(a.date || 0);
              return diff === 0 ? (b.createdAt || 0) - (a.createdAt || 0) : diff;
            });
          }, [transactions, filterMonth, filterType]);

          const sortedSavings = useMemo(() => {
            return savingsTx.sort((a, b) => {
              const diff = new Date(b.date || 0) - new Date(a.date || 0);
              return diff === 0 ? (b.createdAt || 0) - (a.createdAt || 0) : diff;
            });
          }, [savingsTx]);
          
          const sortedCampo = useMemo(() => {
            return campoTx.sort((a, b) => {
              const diff = new Date(b.date || 0) - new Date(a.date || 0);
              return diff === 0 ? (b.createdAt || 0) - (a.createdAt || 0) : diff;
            });
          }, [campoTx]);

          const accountBalances = useMemo(() => {
            const bals = { 'Efectivo': 0, 'Efectivo Guada': 0, 'Efectivo Nico': 0, 'Cuenta Guada': 0, 'Cuenta Nico': 0 };
            transactions.forEach(t => {
              const method = t.paymentMethod || 'Efectivo';
              if (bals[method] === undefined) bals[method] = 0;
              
              if (t.type === 'ingreso') {
                  bals[method] += Number(t.amount || 0);
              } else if (t.type === 'transferencia') {
                  // Sale plata del origen
                  bals[method] -= Number(t.amount || 0);
                  // Entra plata al destino
                  const dest = t.transferTo;
                  if (bals[dest] === undefined) bals[dest] = 0;
                  bals[dest] += Number(t.amount || 0);
              } else {
                  bals[method] -= Number(t.amount || 0);
              }
            });
            // Impacto de los préstamos del campo en nuestros saldos reales
            campoTx.forEach(tx => {
              const method = tx.paymentMethod || 'Efectivo';
              if (bals[method] === undefined) bals[method] = 0;
              if (tx.type === 'le_presto') bals[method] -= Number(tx.amount || 0); // Sale plata nuestra
              else if (tx.type === 'me_presta') bals[method] += Number(tx.amount || 0); // Entra plata a nuestra cuenta
            });
            return bals;
          }, [transactions, campoTx]);

          const totalEfectivo = (accountBalances['Efectivo'] || 0) + (accountBalances['Efectivo Guada'] || 0) + (accountBalances['Efectivo Nico'] || 0);
          const totalSaldos = (accountBalances['Cuenta Guada'] || 0) + (accountBalances['Cuenta Nico'] || 0) + totalEfectivo;

          const campoBalance = useMemo(() => {
             return campoTx.reduce((acc, tx) => acc + (tx.type === 'le_presto' ? Number(tx.amount) : -Number(tx.amount)), 0);
          }, [campoTx]);

          const getPrevMonth = (yyyyMM) => {
              if (!yyyyMM || yyyyMM === 'all') return 'all';
              const [y, m] = yyyyMM.split('-');
              let prevM = parseInt(m, 10) - 1;
              let prevY = parseInt(y, 10);
              if (prevM === 0) { prevM = 12; prevY -= 1; }
              return `${prevY}-${prevM.toString().padStart(2, '0')}`;
          };

          const reportStats = useMemo(() => {
            const totalsByType = { pago_tarjetas: 0, gastos_casa: 0, gastos_diarios: 0, ahorro: 0 };
            let totalIngresos = 0;
            let totalGastos = 0;
            let totalCatamarca = 0;
            const topDiarios = {};
            const catamarcaBreakdown = {};

            const prevMonth = getPrevMonth(filterMonth);
            const prevTotals = { pago_tarjetas: 0, gastos_casa: 0, gastos_diarios: 0 };

            transactions.forEach(t => {
              const safeDate = t.date || '';
              const tMonth = safeDate.substring(0, 7);

              if (filterMonth === 'all' || tMonth === filterMonth) {
                if (t.type === 'ingreso') {
                    totalIngresos += Number(t.amount || 0);
                } else if (t.type === 'catamarca') {
                    totalCatamarca += Number(t.amount || 0);
                    catamarcaBreakdown[t.category] = (catamarcaBreakdown[t.category] || 0) + Number(t.amount || 0);
                } else if (t.type !== 'transferencia') { // Ignoramos traspasos internos porque no son gastos ni ingresos
                  const typeSafe = t.type || 'gastos_diarios';
                  totalsByType[typeSafe] = (totalsByType[typeSafe] || 0) + Number(t.amount || 0);
                  if (typeSafe !== 'ahorro') totalGastos += Number(t.amount || 0);
                  if (typeSafe === 'gastos_diarios') topDiarios[t.category] = (topDiarios[t.category] || 0) + Number(t.amount || 0);
                }
              }

              if (filterMonth !== 'all' && tMonth === prevMonth) {
                if (t.type === 'pago_tarjetas' || t.type === 'gastos_casa' || t.type === 'gastos_diarios') {
                    prevTotals[t.type] += Number(t.amount || 0);
                }
              }
            });

            // Solo 8 items en top fugas
            const sortedDiarios = Object.entries(topDiarios).sort(([, a], [, b]) => b - a).slice(0, 8);
            const sortedCatamarca = Object.entries(catamarcaBreakdown).sort(([, a], [, b]) => b - a);
            const capacityToSave = totalIngresos - totalGastos;
            
            return { totalIngresos, totalGastos, totalCatamarca, totalsByType, sortedDiarios, sortedCatamarca, capacityToSave, prevTotals };
          }, [transactions, filterMonth]);

          const mandatoryChecklist = useMemo(() => {
            const checklist = {
              'Tarjeta Nico': false, 'Tarjeta Guada': false, 'Naranja Nico': false, 'Naranja Guada': false,
              'Expensas casa': false, 'Expensas terreno': false, 'Luz': false, 'Agua': false, 'Crédito auto': false, 'Crédito Hipotecario': false
            };
            
            // Evaluamos TODAS las transacciones del mes, sin importar el filtro de vista ("filterType")
            transactions.forEach(t => {
              const safeDate = t.date || '';
              const matchMonth = filterMonth === 'all' || (safeDate && safeDate.substring(0, 7) === filterMonth);
              
              if (matchMonth && t.category && checklist[t.category] !== undefined) {
                checklist[t.category] = true;
              }
            });
            return checklist;
          }, [transactions, filterMonth]);

          const savingsBalances = useMemo(() => {
            const balances = {};
            SAVINGS_ACCOUNTS.forEach(acc => balances[acc] = 0);
            savingsTx.forEach(tx => {
              const account = tx.account || 'PESOS EFECTIVO';
              if (balances[account] === undefined) balances[account] = 0;
              if (tx.type === 'in') balances[account] += Number(tx.amount || 0);
              else balances[account] -= Number(tx.amount || 0);
            });
            return balances;
          }, [savingsTx]);

          // GUARDADO EN LA NUBE
          const handleSubmit = async (e) => {
            e.preventDefault();
            if (!amount || Number(amount) <= 0) return;
            if (category === 'Otros' && !description.trim()) { showError("Por favor, detalla en la descripción."); return; }

            const newTx = { type, category, amount: Number(amount), paymentMethod, description, date, person, createdAt: Date.now() };

            if (user && dbConfig) {
              const { addDoc, collection } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'transactions'), newTx);
              } catch (err) { showError("Hubo un error al guardar en la nube."); }
            } else { setTransactions([newTx, ...transactions]); }
            setAmount(''); if (category !== 'Otros') setDescription('');
          };

          const deleteTransaction = async (id) => {
            if (user && dbConfig) {
              const { deleteDoc, doc } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await deleteDoc(doc(dbConfig.db, 'artifacts', appId, 'public', 'data', 'transactions', id)); } catch (err) {}
            } else setTransactions(transactions.filter(t => t.id !== id));
          };

          // GUARDADO TRASPASO INTERNO (PASAR PLATA)
          const openInternalTransferModal = () => {
            setInternalTransferModal(true);
            setTransferIntAmount('');
            setTransferIntFrom(PAYMENT_METHODS[0]);
            setTransferIntTo(PAYMENT_METHODS[1]);
            setTransferIntDate(new Date().toISOString().split('T')[0]);
          };

          const handleInternalTransferSubmit = async (e) => {
            e.preventDefault();
            const numAmount = Number(transferIntAmount);
            if (!numAmount || numAmount <= 0) return;
            
            if (transferIntFrom === transferIntTo) {
                showError("La cuenta de origen y destino no pueden ser la misma.");
                return;
            }
            if (numAmount > (accountBalances[transferIntFrom] || 0)) {
                showError(`No tenés suficientes fondos en ${transferIntFrom} para pasar.`);
                return;
            }

            const newTx = { 
                type: 'transferencia', 
                category: 'Paso de Plata', 
                amount: numAmount, 
                paymentMethod: transferIntFrom, // de donde sale
                transferTo: transferIntTo,     // a donde entra
                description: `De ${transferIntFrom} a ${transferIntTo}`, 
                date: transferIntDate, 
                person: 'Ambos', 
                createdAt: Date.now() 
            };

            if (user && dbConfig) {
              const { addDoc, collection } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'transactions'), newTx);
              } catch (err) { showError("Hubo un error al registrar el traspaso."); }
            } else { setTransactions([newTx, ...transactions]); }
            
            setInternalTransferModal(false);
          };

          // GUARDADO CAMPO
          const handleCampoSubmit = async (e) => {
            e.preventDefault();
            if (!campoAmount || Number(campoAmount) <= 0) return;
            if (campoType === 'le_presto' && Number(campoAmount) > accountBalances[campoMethod]) {
                showError(`No tenés suficientes fondos en ${campoMethod} para prestar esa plata.`); return;
            }

            const newCampo = { type: campoType, amount: Number(campoAmount), paymentMethod: campoMethod, description: campoDesc, date: campoDate, createdAt: Date.now() };
            if (user && dbConfig) {
              const { addDoc, collection } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'campo'), newCampo);
              } catch (err) { showError("Hubo un error al guardar en la nube."); }
            } else { setCampoTx([newCampo, ...campoTx]); }
            setCampoAmount(''); setCampoDesc('');
          };

          const deleteCampoTransaction = async (id) => {
            if (user && dbConfig) {
              const { deleteDoc, doc } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await deleteDoc(doc(dbConfig.db, 'artifacts', appId, 'public', 'data', 'campo', id)); } catch (err) {}
            } else setCampoTx(campoTx.filter(t => t.id !== id));
          };

          const handleBudgetSubmit = async () => {
             if (filterMonth === 'all') return;
             if (user && dbConfig) {
                 const { setDoc, doc } = window.Firebase;
                 const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
                 try { await setDoc(doc(dbConfig.db, 'artifacts', appId, 'public', 'data', 'budgets', filterMonth), budgetForm); } catch(err) { showError("Error guardando presupuesto"); }
             } else {
                 setBudgets({...budgets, [filterMonth]: budgetForm});
             }
             setEditingBudget(false);
          };

          const openSavingsModal = (boxId, type) => {
            const box = SAVINGS_BOXES.find(b => b.id === boxId);
            setSavingsModal({ isOpen: true, type, boxId: box.id, accounts: box.accounts, selectedAccount: box.accounts[0] });
            setSavingsAmount(''); setSavingsReason('');
          };
          const closeSavingsModal = () => setSavingsModal({ isOpen: false, type: 'in', boxId: '', accounts: [], selectedAccount: '' });
          const openHistory = (boxId) => {
            const box = SAVINGS_BOXES.find(b => b.id === boxId);
            setHistoryModal({ isOpen: true, boxId: box.id, accounts: box.accounts });
          };
          const closeHistory = () => setHistoryModal({ isOpen: false, boxId: '', accounts: [] });

          const handleSavingsSubmit = async (e) => {
            e.preventDefault();
            const numAmount = Number(savingsAmount);
            if (!numAmount || numAmount <= 0) return;
            const targetAccount = savingsModal.selectedAccount;
            if (savingsModal.type === 'out') {
              if (numAmount > savingsBalances[targetAccount]) { showError("¡No tienes suficientes fondos en esta cuenta!"); return; }
              if (!savingsReason.trim()) { showError("Por favor, ingresa el motivo de la extracción."); return; }
            }
            const newSavingsTx = {
              date: new Date().toISOString().split('T')[0], account: targetAccount, type: savingsModal.type,
              amount: numAmount, reason: savingsReason || (savingsModal.type === 'in' ? 'Ingreso a cuenta' : 'Extracción'), createdAt: Date.now()
            };
            if (user && dbConfig) {
              const { addDoc, collection } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try { await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'savings'), newSavingsTx);
              } catch (err) { showError("Error al guardar ahorro en la nube."); }
            } else setSavingsTx([newSavingsTx, ...savingsTx]);
            closeSavingsModal();
          };

          const deleteSavingsTransaction = async (id) => {
            if (user && dbConfig) {
              const { deleteDoc, doc } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              await deleteDoc(doc(dbConfig.db, 'artifacts', appId, 'public', 'data', 'savings', id));
            } else setSavingsTx(savingsTx.filter(t => t.id !== id));
          };

          const openTransferModal = () => {
            setTransferModal(true); setTransferAmountOut(''); setTransferAmountIn('');
            setTransferFrom(PAYMENT_METHODS[0]); setTransferTo(SAVINGS_ACCOUNTS[0]);
          };

          const handleTransferSubmit = async (e) => {
            e.preventDefault();
            if (!transferAmountOut || !transferAmountIn) return;
            if (Number(transferAmountOut) > accountBalances[transferFrom]) { showError(`No tienes suficientes fondos.`); return; }
            const newTx = { type: 'ahorro', category: 'Envío a Bóveda', amount: Number(transferAmountOut), paymentMethod: transferFrom, description: `Derivación a ${transferTo}`, date: new Date().toISOString().split('T')[0], person: 'Ambos', createdAt: Date.now() };
            const newSav = { date: new Date().toISOString().split('T')[0], account: transferTo, type: 'in', amount: Number(transferAmountIn), reason: `Transferencia desde ${transferFrom}`, createdAt: Date.now() + 1 };
            if (user && dbConfig) {
              const { addDoc, collection } = window.Firebase;
              const appId = typeof __app_id !== 'undefined' ? __app_id : 'finanzas-guada-nico';
              try {
                  await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'transactions'), newTx);
                  await addDoc(collection(dbConfig.db, 'artifacts', appId, 'public', 'data', 'savings'), newSav);
              } catch (err) { showError("Hubo un error."); }
            } else { setTransactions([newTx, ...transactions]); setSavingsTx([newSav, ...savingsTx]); }
            setTransferModal(false);
          };

          const formatARS = (num) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'ARS', maximumFractionDigits: 0 }).format(num || 0);
          const formatUSD = (num) => new Intl.NumberFormat('es-AR', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num || 0);
          const getCurrencyFormatter = (accountName) => accountName.includes('USD') ? formatUSD : formatARS;
          const isUSD = (accountName) => accountName.includes('USD');
          
          const calcDiff = (curr, prev) => {
            if (prev === 0) return curr > 0 ? '+100%' : '0%';
            const diff = ((curr - prev) / prev) * 100;
            return `${diff > 0 ? '+' : ''}${diff.toFixed(1)}%`;
          };

          const getCalendarLink = () => {
            const now = new Date(); now.setHours(23, 0, 0, 0); 
            const end = new Date(now.getTime() + 15 * 60000); 
            const pad = (n) => n.toString().padStart(2, '0');
            const formatLocal = (d) => `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}T${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            const dates = `${formatLocal(now)}/${formatLocal(end)}`;
            return `https://calendar.google.com/calendar/render?action=TEMPLATE&text=Registrar+Gastos+Diarios+%F0%9F%92%B8&details=Entrar+a+la+app+para+cargar+los+gastos+del+d%C3%ADa%3A+https%3A%2F%2Fresonant-kulfi-5e9674.netlify.app&dates=${dates}&recur=RRULE:FREQ=DAILY`;
          };
          
          // Generar meses (incluyendo el mes que viene para poder setear presupuesto futuro)
          const nextMonthObj = new Date(); nextMonthObj.setMonth(nextMonthObj.getMonth() + 1);
          const nextMonthString = nextMonthObj.toISOString().substring(0, 7);
          const availableMonths = [...new Set(transactions.map(t => t.date ? t.date.substring(0, 7) : null).filter(Boolean))];
          if (!availableMonths.includes(currentMonthString)) availableMonths.push(currentMonthString);
          if (!availableMonths.includes(nextMonthString)) availableMonths.push(nextMonthString);
          availableMonths.sort().reverse();

          const getTypeIcon = (txType) => {
            if (txType === 'ingreso' || txType === 'me_presta') return <i className="fas fa-arrow-trend-up text-xl opacity-80"></i>;
            if (txType === 'pago_tarjetas') return <i className="fas fa-credit-card text-xl opacity-80"></i>;
            if (txType === 'gastos_casa') return <i className="fas fa-home text-xl opacity-80"></i>;
            if (txType === 'ahorro') return <i className="fas fa-piggy-bank text-xl opacity-80"></i>;
            if (txType === 'le_presto') return <i className="fas fa-tractor text-xl opacity-80"></i>;
            if (txType === 'transferencia') return <i className="fas fa-right-left text-xl opacity-80"></i>;
            if (txType === 'catamarca') return <i className="fas fa-briefcase text-xl opacity-80"></i>;
            return <i className="fas fa-bag-shopping text-xl opacity-80"></i>;
          };

          const getTypeColor = (txType) => {
            if (txType === 'ingreso' || txType === 'me_presta') return 'bg-emerald-100 text-emerald-600';
            if (txType === 'pago_tarjetas') return 'bg-purple-100 text-purple-600';
            if (txType === 'gastos_casa') return 'bg-blue-100 text-blue-600';
            if (txType === 'ahorro') return 'bg-teal-100 text-teal-600';
            if (txType === 'le_presto') return 'bg-amber-100 text-amber-600';
            if (txType === 'transferencia') return 'bg-indigo-100 text-indigo-600';
            if (txType === 'catamarca') return 'bg-cyan-100 text-cyan-700';
            return 'bg-rose-100 text-rose-600';
          };

          return (
            <div className="min-h-screen bg-slate-50 font-sans text-slate-800 pb-12 relative">
              
              {errorMsg && (
                <div className="fixed top-4 left-1/2 transform -translate-x-1/2 bg-rose-600 text-white px-6 py-3 rounded-full shadow-lg font-bold text-sm z-50 flex items-center gap-2 animate-in slide-in-from-top-4">
                  <i className="fas fa-circle-exclamation"></i> {errorMsg}
                </div>
              )}

              <header className="bg-teal-700 text-white p-6 shadow-md">
                <div className="max-w-5xl mx-auto">
                  <div className="flex flex-col lg:flex-row justify-between items-center gap-4">
                    <div className="flex items-center gap-3 w-full lg:w-auto justify-center lg:justify-start">
                      <i className="fas fa-home text-3xl text-teal-200"></i>
                      <div>

                        <p className="text-teal-100 text-sm flex items-center gap-1">
                          <i className={`fas fa-circle text-[8px] ${isDbConnected ? 'text-emerald-400' : 'text-amber-400'}`}></i>

                        </p>
                      </div>
                    </div>
                    
                    <div className="flex bg-teal-800 rounded-xl p-1 shadow-inner overflow-x-auto w-full lg:w-auto">
                      <button onClick={() => setActiveTab('dashboard')} className={`flex-1 lg:flex-none flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${activeTab === 'dashboard' ? 'bg-white text-teal-900 shadow-sm' : 'text-teal-100 hover:text-white'}`}>
                        <i className="fas fa-pen-to-square"></i> Carga Diaria
                      </button>
                      <button onClick={() => setActiveTab('reporte')} className={`flex-1 lg:flex-none flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${activeTab === 'reporte' ? 'bg-white text-teal-900 shadow-sm' : 'text-teal-100 hover:text-white'}`}>
                        <i className="fas fa-chart-pie"></i> Análisis Mensual
                      </button>
                      <button onClick={() => setActiveTab('ahorros')} className={`flex-1 lg:flex-none flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${activeTab === 'ahorros' ? 'bg-white text-teal-900 shadow-sm' : 'text-teal-100 hover:text-white'}`}>
                        <i className="fas fa-building-columns"></i> Mis Ahorros
                      </button>
                      <button onClick={() => setActiveTab('campo')} className={`flex-1 lg:flex-none flex justify-center items-center gap-2 px-4 py-2.5 rounded-lg text-sm font-bold transition-all whitespace-nowrap ${activeTab === 'campo' ? 'bg-amber-100 text-amber-900 shadow-sm' : 'text-teal-100 hover:text-white'}`}>
                        <i className="fas fa-tractor"></i> Préstamos Campo
                      </button>
                    </div>
                  </div>

                  {activeTab !== 'ahorros' && activeTab !== 'campo' && (

                        <option value="all" className="text-slate-800">Todo el historial</option>
                        {availableMonths.map(m => <option key={m} value={m} className="text-slate-800">{m}</option>)}
                      </select>
                    </div>
                  )}
                </div>
              </header>

                      </h2>

                          <div className="flex justify-between items-start mb-2">
                            <span className="font-bold text-emerald-800 uppercase tracking-wider text-xs">Ingresos del Mes</span>
                            <i className="fas fa-arrow-trend-up text-xl text-emerald-400"></i>
                          </div>
                          <span className="text-4xl font-black block text-emerald-700 mb-1">{formatARS(reportStats.totalIngresos)}</span>
                          <p className="text-sm text-emerald-600/80">Todo el dinero que ingresó en este período.</p>
                        </div>
                      </div>

                      {/* GASTOS */}
                      <div className="bg-rose-50 rounded-2xl p-6 shadow-sm border border-rose-100 flex flex-col justify-between">
                        <div>
                          <div className="flex justify-between items-start mb-2">
                            <span className="font-bold text-rose-800 uppercase tracking-wider text-xs">Gastos del Mes</span>
                            <i className="fas fa-arrow-trend-down text-xl text-rose-400"></i>

                          <span className="text-4xl font-black block text-rose-700 mb-1">{formatARS(reportStats.totalGastos)}</span>
                          <p className="text-sm text-rose-600/80">Suma total de pagos fijos, tarjetas y diarios.</p>
                        </div>
                      </div>

                      {/* AHORRO SUGERIDO */}
                      <div className="bg-gradient-to-br from-indigo-500 to-blue-600 rounded-2xl p-6 text-white shadow-sm flex flex-col justify-between relative overflow-hidden">
                        <div className="absolute right-0 top-0 opacity-10 p-4"><i className="fas fa-piggy-bank text-6xl"></i></div>
                        <div className="relative z-10">
                          <div className="flex justify-between items-start mb-2">
                            <span className="font-bold text-indigo-100 uppercase tracking-wider text-xs">Capacidad de Ahorro</span>
                          </div>
                          <span className="text-4xl font-black block mb-1">{formatARS(reportStats.capacityToSave)}</span>
                          <p className="text-sm text-indigo-100">Dinero limpio que sobró este mes.</p>
                        </div>
                        <div className="relative z-10 mt-4 pt-4 border-t border-indigo-400/30">
                           {reportStats.capacityToSave > 0 ? (
                            <span className="text-sm font-bold flex items-center gap-1 text-emerald-300"><i className="fas fa-check-circle"></i> ¡Tienen margen!</span>
                           ) : (
                            <span className="text-sm font-bold flex items-center gap-1 text-rose-300"><i className="fas fa-triangle-exclamation"></i> En rojo / cero</span>
                           )}
                        </div>
                      </div>
                    </div>

                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                      
                      {/* COLUMNA IZQUIERDA: DISTRIBUCIÓN */}
                      <div className="lg:col-span-1">
                        {/* ESTRUCTURA DEL GASTO (%) */}
                        <div className="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 h-full">
                          <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider mb-6 flex items-center gap-2">
                            <i className="fas fa-chart-pie text-blue-500"></i> Distribución del Gasto
                          </h3>
                          <div className="space-y-5">
                            {[
                              { key: 'pago_tarjetas', label: 'Pago Tarjetas', color: 'purple' },
                              { key: 'gastos_casa', label: 'Pagos casa', color: 'blue' },
                              { key: 'gastos_diarios', label: 'Gastos Diarios', color: 'rose' }
                            ].map(cat => {
                              const amt = reportStats.totalsByType[cat.key] || 0;
                              const pct = reportStats.totalGastos > 0 ? Math.round((amt / reportStats.totalGastos) * 100) : 0;
                              return (
                                <div key={cat.key}>
                                  <div className="flex justify-between items-end mb-1">
                                    <span className="text-sm font-bold text-slate-700 flex items-center gap-2">
                                      <i className={`fas ${cat.key === 'pago_tarjetas' ? 'fa-credit-card text-purple-500' : cat.key === 'gastos_casa' ? 'fa-home text-blue-500' : 'fa-bag-shopping text-rose-500'}`}></i> {cat.label}
                                    </span>
                                    <div className="text-right">
                                      <span className="text-sm font-black text-slate-800">{pct}%</span>
                                    </div>
                                  </div>
                                  <div className="w-full bg-slate-100 rounded-full h-2.5 mb-1">
                                    <div className={`h-2.5 rounded-full bg-${cat.color}-500`} style={{ width: `${pct}%` }}></div>
                                  </div>
                                  <div className="text-right">
                                     <span className="text-xs font-bold text-slate-400">{formatARS(amt)}</span>
                                  </div>
                                </div>
                              )
                            })}
                          </div>
                        </div>
                      </div>

                      {/* COLUMNA DERECHA: PRESUPUESTO Y COMPARATIVA */}
                      <div className="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-slate-100 h-fit">
                        <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                          <div>
                            <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider flex items-center gap-2">
                              <i className="fas fa-bullseye text-indigo-500"></i> Presupuesto & Comparativa
                            </h3>
                            <p className="text-xs text-slate-500 mt-1">Cómo venís contra tu plan y contra el mes pasado.</p>
                          </div>
                          {filterMonth !== 'all' && (
                            <button onClick={() => setEditingBudget(!editingBudget)} className="bg-indigo-50 hover:bg-indigo-100 text-indigo-700 px-3 py-1.5 rounded-lg text-xs font-bold transition-colors">
                              {editingBudget ? 'Cancelar Edición' : 'Editar Presupuesto'}

                          <div className="py-8 text-center text-slate-400 text-sm">Selecciona un mes específico en el filtro de arriba para habilitar la planificación de presupuestos y comparar meses.</div>
                        ) : editingBudget ? (
                          <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 space-y-4">
                             <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1"><i className="fas fa-credit-card"></i> Tarjetas</label>
                                    <input 
                                      type="text" 
                                      inputMode="numeric"

                                      className="w-full p-2 border rounded focus:ring-2 outline-none font-bold" 
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1"><i className="fas fa-home"></i> Casa</label>
                                    <input 
                                      type="text" 
                                      inputMode="numeric"
                                      value={budgetForm.gastos_casa ? Number(budgetForm.gastos_casa).toLocaleString('es-AR') : ''} 
                                      onChange={e => setBudgetForm({...budgetForm, gastos_casa: Number(e.target.value.replace(/\D/g, ''))})} 
                                      className="w-full p-2 border rounded focus:ring-2 outline-none font-bold" 
                                    />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-slate-500 mb-1"><i className="fas fa-coffee"></i> Diarios</label>
                                    <input 
                                      type="text" 
                                      inputMode="numeric"
                                      value={budgetForm.gastos_diarios ? Number(budgetForm.gastos_diarios).toLocaleString('es-AR') : ''} 
                                      onChange={e => setBudgetForm({...budgetForm, gastos_diarios: Number(e.target.value.replace(/\D/g, ''))})} 
                                      className="w-full p-2 border rounded focus:ring-2 outline-none font-bold" 
                                    />
                                </div>
                             </div>
                             <button onClick={handleBudgetSubmit} className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 rounded-lg">Guardar Presupuesto</button>
                          </div>
                        ) : (
                          <div className="space-y-6">
                            {[
                              { key: 'pago_tarjetas', label: 'Pago Tarjetas', icon: 'fa-credit-card', color: 'purple' },
                              { key: 'gastos_casa', label: 'Pagos casa', icon: 'fa-home', color: 'blue' },
                              { key: 'gastos_diarios', label: 'Gastos Diarios', icon: 'fa-bag-shopping', color: 'rose' }
                            ].map(cat => {
                               const actual = reportStats.totalsByType[cat.key];
                               const presu = budgetForm[cat.key] || 0;
                               const prev = reportStats.prevTotals[cat.key];
                               const pct = presu > 0 ? Math.min(Math.round((actual / presu) * 100), 100) : 0;
                               const over = presu > 0 && actual > presu;
                               const trend = calcDiff(actual, prev);
